<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0d222b" />
    <title>연결 확인 | 현장완료</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0d222b;
        color: #edf4f2;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { width: min(100% - 40px, 560px); }
      small { color: #f29b73; font-weight: 700; letter-spacing: .08em; }
      h1 { margin: 18px 0 14px; font-size: clamp(2rem, 8vw, 3.3rem); line-height: 1.15; }
      p { color: #c6d4d1; line-height: 1.7; }
      button {
        min-height: 48px;
        margin-top: 20px;
        border: 0;
        border-radius: 7px;
        padding: 0 20px;
        background: #c44610;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <small>OFFLINE · 현장완료</small>
      <h1>인터넷 연결을 확인해 주세요.</h1>
      <p>
        이 기기에서 이미 열어 둔 현장 기록은 브라우저에 임시 보존될 수 있습니다.
        연결이 돌아온 뒤 같은 화면에서 다시 시도하면 서버 저장을 이어갑니다.
      </p>
      <button type="button" onclick="location.reload()">다시 연결하기</button>
    </main>
  </body>
</html>
